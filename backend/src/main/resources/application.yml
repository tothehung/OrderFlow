server:
  port: 8080

spring:
  application:
    name: orderflow-backend

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://orderflow:orderflow123@localhost:27017/orderflow?authSource=admin}
      auto-index-creation: false

    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:redis123}
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 1000ms

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: orderflow-consumer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.orderflow.event"
    listener:
      ack-mode: MANUAL_IMMEDIATE

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# App-specific config
app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  kafka:
    topics:
      order-created: order.created
      order-status-updated: order.status.updated
      order-cancelled: order.cancelled
  cache:
    order-ttl-minutes: 30

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.orderflow: DEBUG
    org.springframework.kafka: INFO
    org.springframework.data.mongodb: INFO